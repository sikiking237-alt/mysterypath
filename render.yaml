services:
  - type: web
    name: mysterypath-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && python run.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///mysterypath.db
      - key: FLASK_ENV
        value: production
      - key: FRONTEND_URL
        value: https://your-frontend-app.vercel.app
    plan: free
