services:
  - type: web
    name: mysterypath-backend
    runtime: python
    repo: https://github.com/sikiking237-alt/mysterypath
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && python -m gunicorn wsgi:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///mysterypath.db
      - key: FLASK_ENV
        value: production
      - key: FRONTEND_URL
        value: https://mysterypath-v2-git-main-sikiking237-6970s-projects.vercel.app
      - key: PYTHON_VERSION
        value: 3.11.0
    plan: free
