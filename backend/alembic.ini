# Alembic Configuration File
# This file contains the configuration for Alembic migrations.

[alembic]
# Path to migration scripts directory
# The sqlalchemy.url is now configured dynamically in alembic/env.py
# using your application's settings from database.py.
# sqlalchemy.url = postgresql://user:password@localhost/mysterypath_db

script_location = alembic
prepend_sys_path = .

# Template used to generate migration file names
file_template = %%(rev)s_%%(slug)s
date_format = %Y%m%d_%H%M%S

# Logging configuration
[loggers]
keys = root,sqlalchemy.engine

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy.engine]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
